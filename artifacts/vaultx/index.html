<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#060d1a" />
    <title>Wexora Global — Digital Investment Platform</title>
    <meta name="description" content="Wexora Global is a secure digital investment platform offering global opportunities, daily ROI, flexible investment plans, and real-time portfolio tracking." />
    <meta name="application-name" content="Wexora Global" />
    <meta name="robots" content="index, follow" />
    <!-- Open Graph -->
    <meta property="og:title" content="Wexora Global — Digital Investment Platform" />
    <meta property="og:description" content="Global Opportunities. Smarter Growth. Join Wexora Global and access premium digital investment opportunities." />
    <meta property="og:image" content="/wx-social.png" />
    <meta property="og:url" content="https://wexoraglobal.com" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Wexora Global" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wexora Global" />
    <meta name="twitter:description" content="Global Opportunities. Smarter Growth." />
    <meta name="twitter:image" content="/wx-social.png" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/wx-logo.png" />
    <link rel="apple-touch-icon" href="/wx-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      /* Prevent any white flash before JS runs */
      html { background-color: #f8fafc; }
      html.app-mode { background-color: #060d1a !important; }
      html.app-mode body { background-color: #060d1a !important; }
      html.dark { background-color: hsl(222, 47%, 9%); }
    </style>
    <script>
      // Runs before first paint — no flash
      (function() {
        try {
          // Apply saved theme
          var theme = localStorage.getItem('wexora-theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }

          // Detect app mode (WebView / PWA / AppGeyser)
          var ua = navigator.userAgent || '';
          var isStandalone =
            ('standalone' in navigator && navigator.standalone === true) ||
            window.matchMedia('(display-mode: standalone)').matches ||
            window.matchMedia('(display-mode: fullscreen)').matches;
          var isWebView =
            /wv/.test(ua) ||
            /WebView/.test(ua) ||
            /AppGeyser/.test(ua) ||
            (/Android/.test(ua) && !/Chrome\/[.0-9]*\s+Mobile/.test(ua) && /Version\//.test(ua)) ||
            (!/Chrome/.test(ua) && /Android/.test(ua));

          if (isStandalone || isWebView) {
            document.documentElement.classList.add('app-mode');
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
